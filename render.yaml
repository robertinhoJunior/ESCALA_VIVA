services:
  - type: web
    name: escalaviva-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: escalaviva-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: escalaviva-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: escalaviva-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: escalaviva-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: escalaviva-db
          property: database
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: escalaviva-db
    databaseName: escalaviva
    plan: free
