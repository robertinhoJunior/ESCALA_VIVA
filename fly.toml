app = "escalaviva-api"
primary_region = "gru"   # São Paulo

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines = true
  auto_start_machines = true

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
